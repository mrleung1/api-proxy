<!DOCTYPE html>
<html>
<head>
  <title>Cheap AI API</title>
</head>

<body>

<h1>Cheap AI API Gateway</h1>

<p>Create your account:</p>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">
Sign Up
</button>
  
<button onclick="getApiKey()">
Get API Key
</button>

<p id="apikey"></p>
  <h2>Ask AI</h2>

<input id="question"
placeholder="Ask something">

<button onclick="askAI()">
Ask
</button>

<p id="answer"></p>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = 'https://lkqsenlrpfuwjrragyzo.supabase.co'
const supabaseKey = 'sb_publishable_KskVSPr8aCfIYNLi3_Vy5Q_0QnyfE7e'

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
)

async function signup() {

  const email =
    document.getElementById('email').value

  const password =
    document.getElementById('password').value

  const { data, error } =
    await client.auth.signUp({
      email,
      password
    })

  if(error) {
    alert(error.message)
  } else {
    alert("Account created!")
  }
}
function getApiKey() {

  const fakeKey =
    "sk-" +
    Math.random().toString(36).substring(2)

  document.getElementById(
    "apikey"
  ).innerText = fakeKey
}
  async function askAI() {

  const question =
    document.getElementById(
      "question"
    ).value

  const response = await fetch(
    "https://api.deepseek.com/chat/completions",
    {
      method: "POST",

      headers: {
        "Content-Type":
          "application/json",

        "Authorization":
          "Bearer sk-9ea90beab6f74821a4273ab3067b930e "
      },

      body: JSON.stringify({

        model: "deepseek-chat",

        messages: [
          {
            role: "user",
            content: question
          }
        ]

      })

    }
  )

  const data =
    await response.json()

  const answer =
    data.choices[0]
    .message.content

  document.getElementById(
    "answer"
  ).innerText = answer
}
</script>

</body>
</html>
